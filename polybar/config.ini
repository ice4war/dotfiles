[colors]
background-alt = #468386
background = #272727
foreground = #e5e9f0
foreground-alt = #282e3a
primary = #ffb52a
secondary = #e60053
alert = #B48EAD

cyan = #88C0D0
aqua = #8FBCBB
red = #BF616A
yellow = #EBCB8B
green = #A3BE8C
orange = #D08770
magenta = #BF616A
white = #D8DEE9
pink = #C394B4
blue = #468368
black = #3B4252

[bar/example]
width = 100%
height = 20pt
radius = 6
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 3pt
border-color = #000000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = " "
separator-foreground = ${colors.black}

font-0 = "Cascadia Code:size=10"
font-1 = "JetBrainsMono Nerd Font:size=8"
font-2 = "Symbols Nerd Font:size=8"

modules-left = bspwm xwindow
modules-right = filesystem memory cpu battery wlan date systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/bspwm]
type = internal/bspwm
ws-icon-0 = I;Óěē
ws-icon-1 = II;ůįĖü
ws-icon-2 = III;ÓĮä
ws-icon-3 = IV;ÔĀĄ
ws-icon-4 = V;Óįõ
ws-icon-5 = VI;ÔÄĹ
ws-icon-6 = VII;ůį≠Ļ
ws-icon-7 = VIII;ÔČü
ws-icon-8 = IX;ÔĄõ
ws-icon-9 = X;ůįáī
ws-icon-default = Óėé

label-active = %icon%
label-active-background = ${colors.black}
label-active-underline = ${colors.yellow}
label-active-foreground = ${colors.yellow}
label-active-padding = 1

label-occupied = %icon%
label-occupied-foreground = ${colors.cyan}
label-occupied-underline = ${colors.cyan}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-padding = 2

label-empty = %icon%
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
format-foreground = ${colors.orange}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /
fixed-values = true
spacing = 4 
warn-percentage = 75
label-mounted =  Óóĺ %percentage_used%%
label-mounted-foreground = ${colors.blue}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.black}


[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.red}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.green}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-connected-prefix = "Ôáę  "
format-connected-foreground = ${colors.blue}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "ůįĖ™ "
format-disconnected-foreground = ${colors.red}
label-disconnected = disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %essid%%downspeed:9%
label-connected-foreground = ${colors.aqua}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 99
battery = BAT1
adapter = ACAD
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-prefix-foreground = ${colors.red}
label-charging = %percentage%%

format-discharging = <ramp-capacity><label-discharging>
label-discharging = %percentage%%

format-full = <label-full>
format-full-prefix = ÔČÄ
format-full-prefix-font = 5
format-full-prefix-padding = 3 pt
format-full-prefix-foreground = ${colors.green}
label-full = "%percentage%%"

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-foreground = ${colors.yellow}
ramp-capacity-font = 5
ramp-capacity-padding = 3 pt

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-foreground = ${colors.green}
animation-charging-font = 5
animation-charging-padding = 3 pt
animation-charging-framerate = 700

[module/left]
type = custom/text
label = "H"
label-foreground = ${colors.green}
label-background = ${colors.black}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
